naftiko: 1.0.0-alpha2
info:
  label: NVIDIA NIM Models
  description: 'NVIDIA NIM model catalog endpoint via /v1/models.'
  tags:
  - NVIDIA
  - NIM
  - Models
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NVIDIA_API_KEY: NVIDIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: models
    baseUri: https://integrate.api.nvidia.com
    resources:
    - name: models
      path: /v1/models
      operations:
      - name: listmodels
        method: GET
        description: List Available Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.NVIDIA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: models-rest
    port: 8080
    resources:
    - path: /v1/models
      name: models
      operations:
      - method: GET
        name: listmodels
        description: List Available Models
        call: models.listmodels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: models-mcp
    port: 9090
    transport: http
    tools:
    - name: nvidia-nim-list-models
      description: List Available Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: models.listmodels
      outputParameters:
      - type: object
        mapping: $.
