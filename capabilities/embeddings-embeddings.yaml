naftiko: 1.0.0-alpha2
info:
  label: NVIDIA NIM Embeddings
  description: 'NeMo Retriever text embeddings via OpenAI-compatible /v1/embeddings.'
  tags:
  - NVIDIA
  - NIM
  - Embeddings
  - RAG
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NVIDIA_API_KEY: NVIDIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: embeddings
    baseUri: https://integrate.api.nvidia.com
    description: NVIDIA NIM embeddings.
    resources:
    - name: embeddings
      path: /v1/embeddings
      operations:
      - name: createembedding
        method: POST
        description: Create An Embedding
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.NVIDIA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: embeddings-rest
    port: 8080
    resources:
    - path: /v1/embeddings
      name: embeddings
      operations:
      - method: POST
        name: createembedding
        description: Create An Embedding
        call: embeddings.createembedding
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: embeddings-mcp
    port: 9090
    transport: http
    tools:
    - name: nvidia-nim-embed
      description: Create An Embedding
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: embeddings.createembedding
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
