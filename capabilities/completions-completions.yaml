naftiko: 1.0.0-alpha2
info:
  label: NVIDIA NIM Completions
  description: 'NVIDIA NIM legacy text completions endpoint.'
  tags:
  - NVIDIA
  - NIM
  - Completions
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NVIDIA_API_KEY: NVIDIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: completions
    baseUri: https://integrate.api.nvidia.com
    description: NVIDIA NIM hosted text completions surface.
    resources:
    - name: completions
      path: /v1/completions
      operations:
      - name: createcompletion
        method: POST
        description: Create A Text Completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.NVIDIA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: completions-rest
    port: 8080
    resources:
    - path: /v1/completions
      name: completions
      operations:
      - method: POST
        name: createcompletion
        description: Create A Text Completion
        call: completions.createcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: completions-mcp
    port: 9090
    transport: http
    tools:
    - name: nvidia-nim-completion
      description: Create A Text Completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: completions.createcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
