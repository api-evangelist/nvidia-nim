naftiko: 1.0.0-alpha2
info:
  label: NVIDIA NIM Image Generation
  description: 'Visual generative AI NIMs — FLUX.1, SDXL, Edify Image.'
  tags:
  - NVIDIA
  - NIM
  - Image Generation
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NVIDIA_API_KEY: NVIDIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: image-generation
    baseUri: https://integrate.api.nvidia.com
    resources:
    - name: genai
      path: /v1/genai/{publisher}/{model}
      operations:
      - name: generateimage
        method: POST
        description: Generate An Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publisher
          in: path
          type: string
          required: true
        - name: model
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.NVIDIA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: image-generation-rest
    port: 8080
    resources:
    - path: /v1/genai/{publisher}/{model}
      name: genai
      operations:
      - method: POST
        name: generateimage
        description: Generate An Image
        call: image-generation.generateimage
        with:
          publisher: rest.publisher
          model: rest.model
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: image-generation-mcp
    port: 9090
    transport: http
    tools:
    - name: nvidia-nim-generate-image
      description: Generate An Image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: image-generation.generateimage
      with:
        publisher: tools.publisher
        model: tools.model
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
