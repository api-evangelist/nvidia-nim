naftiko: 1.0.0-alpha2
info:
  label: NVIDIA NIM Reranking
  description: 'NeMo Retriever cross-encoder reranking via /v1/ranking.'
  tags:
  - NVIDIA
  - NIM
  - Reranking
  - RAG
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NVIDIA_API_KEY: NVIDIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: reranking
    baseUri: https://integrate.api.nvidia.com
    resources:
    - name: ranking
      path: /v1/ranking
      operations:
      - name: rankpassages
        method: POST
        description: Rank Candidate Passages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.NVIDIA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: reranking-rest
    port: 8080
    resources:
    - path: /v1/ranking
      name: ranking
      operations:
      - method: POST
        name: rankpassages
        description: Rank Candidate Passages
        call: reranking.rankpassages
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reranking-mcp
    port: 9090
    transport: http
    tools:
    - name: nvidia-nim-rerank
      description: Rank Candidate Passages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reranking.rankpassages
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
