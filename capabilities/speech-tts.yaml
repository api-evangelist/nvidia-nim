naftiko: 1.0.0-alpha2
info:
  label: NVIDIA NIM Speech — TTS
  description: 'Riva TTS (text-to-speech) NIMs — Magpie-TTS, FastPitch.'
  tags:
  - NVIDIA
  - NIM
  - Riva
  - TTS
  - Speech
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    NVIDIA_API_KEY: NVIDIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: speech-tts
    baseUri: https://integrate.api.nvidia.com
    resources:
    - name: speech
      path: /v1/audio/speech
      operations:
      - name: createspeech
        method: POST
        description: Synthesize Speech
        outputRawFormat: binary
        outputParameters:
        - name: result
          type: binary
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.NVIDIA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: speech-tts-rest
    port: 8080
    resources:
    - path: /v1/audio/speech
      name: speech
      operations:
      - method: POST
        name: createspeech
        description: Synthesize Speech
        call: speech-tts.createspeech
        with:
          body: rest.body
        outputParameters:
        - type: binary
          mapping: $.
  - type: mcp
    namespace: speech-tts-mcp
    port: 9090
    transport: http
    tools:
    - name: nvidia-nim-tts
      description: Synthesize Speech
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: speech-tts.createspeech
      with:
        body: tools.body
      outputParameters:
      - type: binary
        mapping: $.
