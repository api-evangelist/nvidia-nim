notes: >-
  NVIDIA publishes no first-party hosted/remote MCP server for the NIM inference API.
  NVIDIA's MCP story lives in the NeMo Agent Toolkit, which can run as a self-hosted MCP
  server (streamable-http, default http://localhost:9901/mcp) that publishes workflow tools
  and can also act as an MCP client — but that is an agent-framework server, not a hosted
  endpoint that fronts the NIM REST surface. There is also a community NVIDIA NIM MCP server
  (not first-party). The tool list below is DERIVED one-per-operation from the repo's OpenAPI
  as a candidate; it is not a published NVIDIA server.
